<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Riviera — Premium 2BR Stay at Meikarta D2</title>
<meta name="description" content="A modern 2-bedroom apartment on a high floor of Meikarta Riviera District 2. Owner-managed, directly bookable, no platform fees." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ─────────────────────────────────────────────────────────────────────────
   Casa Riviera — base styles
   Three visual variants share most tokens; only accent rhythm + type scale
   shift between them. Layout is fluid; mobile-first.
   ───────────────────────────────────────────────────────────────────────── */

:root {
  /* shared palette */
  --bg: #f4f0e8;
  --bg-alt: #ebe4d4;
  --paper: #fbf8f2;
  --ink: #1c1c1a;
  --ink-soft: #6b665f;
  --ink-mute: #a8a39a;
  --accent: #8b3a1d;
  --accent-soft: #c08c4c;
  --line: rgba(28, 28, 26, 0.10);
  --line-strong: rgba(28, 28, 26, 0.18);

  /* type — overridden per variant */
  --serif: 'Fraunces', 'Times New Roman', serif;
  --sans: 'Inter Tight', system-ui, sans-serif;

  --h-scale: 1.0;            /* heading size multiplier */
  --rhythm: 1.0;             /* vertical rhythm multiplier */
  --radius: 8px;
  --radius-lg: 14px;

  /* effective hero layout — set by JS to one of: split / fullbleed / centered */
  --hero-min: 100vh;
}

/* ── Variants ───────────────────────────────────────────────────────────── */
/* applied to <body data-variant="..."> */

body[data-variant="minimal"] {
  --h-scale: 0.95;
  --rhythm: 1.1;
  --radius: 4px;
  --radius-lg: 8px;
  --line: rgba(28, 28, 26, 0.08);
  --accent: #6f3a23;          /* slightly muted */
}

body[data-variant="editorial"] {
  --h-scale: 1.18;
  --rhythm: 1.0;
  --radius: 2px;
  --radius-lg: 4px;
  --accent: #8b3a1d;
}

body[data-variant="playful"] {
  --h-scale: 1.02;
  --rhythm: 0.95;
  --radius: 14px;
  --radius-lg: 22px;
  --accent: #b04a26;
}

/* ── Reset & base ───────────────────────────────────────────────────────── */

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  font-feature-settings: "ss01", "cv11";
}
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
.serif { font-family: var(--serif); font-weight: 400; }

/* ── Layout primitives ──────────────────────────────────────────────────── */

.container {
  width: 100%;
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 24px;
}
@media (min-width: 880px) {
  .container { padding: 0 56px; }
}

section { position: relative; }

.section-pad {
  padding: calc(5rem * var(--rhythm)) 0;
}
@media (min-width: 880px) {
  .section-pad { padding: calc(7rem * var(--rhythm)) 0; }
}

.section-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 1.2rem;
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
  font-weight: 500;
}
.section-label::before {
  content: '';
  width: 28px; height: 1px;
  background: var(--accent);
}

.section-title {
  font-family: var(--serif);
  font-size: clamp(1.9rem, calc(4.5vw * var(--h-scale)), calc(3.2rem * var(--h-scale)));
  font-weight: 400;
  letter-spacing: -0.025em;
  line-height: 1.05;
  margin-bottom: 1.2rem;
  text-wrap: balance;
}
.section-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 300;
}

.eyebrow {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

/* ── Nav ────────────────────────────────────────────────────────────────── */

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 80;
  padding: 1.1rem 0;
  background: rgba(244, 240, 232, 0);
  border-bottom: 1px solid transparent;
  transition: background .25s ease, border-color .25s ease, padding .25s ease;
}
.nav.scrolled {
  background: rgba(244, 240, 232, 0.86);
  border-bottom-color: var(--line);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  padding: 0.85rem 0;
}
.nav-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
}
.brand {
  font-family: var(--serif);
  font-size: 1.4rem;
  letter-spacing: -0.02em;
  font-weight: 500;
  display: flex;
  align-items: baseline;
  gap: 0.35rem;
}
.brand em { font-style: italic; color: var(--accent); font-weight: 400; }
.brand .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  margin: 0 0.35rem;
  transform: translateY(-3px);
}
.nav-links {
  display: none;
  gap: 2rem;
  font-size: 0.85rem;
  color: var(--ink-soft);
}
.nav-links a {
  position: relative;
  transition: color .2s;
}
.nav-links a:hover { color: var(--ink); }
.nav-links a::after {
  content: '';
  position: absolute;
  left: 0; right: 100%;
  bottom: -4px; height: 1px;
  background: var(--accent);
  transition: right .25s ease;
}
.nav-links a:hover::after { right: 0; }
.nav-cta {
  display: none;
  padding: 0.6rem 1.2rem;
  background: var(--ink);
  color: var(--bg);
  border-radius: 100px;
  font-size: 0.82rem;
  letter-spacing: 0.01em;
  border: none;
  transition: background .2s;
}
.nav-cta:hover { background: var(--accent); }
@media (min-width: 880px) {
  .nav-links { display: flex; }
  .nav-cta { display: inline-flex; align-items: center; gap: 0.4rem; }
}

/* ── Buttons ────────────────────────────────────────────────────────────── */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.95rem 1.6rem;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 0.92rem;
  letter-spacing: 0.01em;
  border: none;
  border-radius: 100px;
  transition: background .25s ease, color .25s ease, transform .25s ease, border-color .25s ease;
  white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
}
.btn-secondary:hover { background: var(--ink); color: var(--bg); }
.btn .arr { transition: transform .25s; display: inline-block; }
.btn:hover .arr { transform: translateX(4px); }

/* Playful variant: pill buttons get a hair more padding + tinted secondary */
body[data-variant="playful"] .btn { padding: 1.05rem 1.7rem; }
body[data-variant="playful"] .btn-secondary {
  border-color: var(--line-strong);
  background: var(--paper);
}

/* Editorial variant: squarer buttons */
body[data-variant="editorial"] .btn {
  border-radius: 4px;
  padding: 1rem 1.5rem;
  letter-spacing: 0.04em;
  font-size: 0.85rem;
  text-transform: uppercase;
}

/* ── Hero ───────────────────────────────────────────────────────────────── */

.hero {
  min-height: 100svh;
  padding: 7rem 0 4rem;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute;
  top: 20%; right: -10%;
  width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(192,140,76,0.18) 0%, transparent 65%);
  z-index: 0;
  pointer-events: none;
  filter: blur(10px);
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2.5rem;
  align-items: center;
  position: relative;
  z-index: 1;
}

@media (min-width: 880px) {
  .hero { padding: 8.5rem 0 6rem; }
  .hero-grid { grid-template-columns: 1.05fr 1fr; gap: 4rem; }
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 1.8rem;
  padding: 0.5rem 1rem 0.5rem 0.85rem;
  border: 1px solid var(--line);
  border-radius: 100px;
  background: var(--paper);
  font-weight: 500;
}
.hero-tag .pulse {
  width: 7px; height: 7px;
  background: #1f8a5b;
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 0 0 rgba(31,138,91,0.4);
  animation: pulse 2.2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(31,138,91,0.4); }
  70% { box-shadow: 0 0 0 8px rgba(31,138,91,0); }
  100% { box-shadow: 0 0 0 0 rgba(31,138,91,0); }
}

h1.hero-title {
  font-family: var(--serif);
  font-size: clamp(2.6rem, calc(7vw * var(--h-scale)), calc(5.4rem * var(--h-scale)));
  font-weight: 400;
  line-height: 0.96;
  letter-spacing: -0.035em;
  margin-bottom: 1.6rem;
  text-wrap: balance;
}
h1.hero-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 300;
}

.hero-lead {
  font-size: clamp(1rem, 1.4vw, 1.12rem);
  color: var(--ink-soft);
  max-width: 34rem;
  line-height: 1.65;
}

.hero-meta {
  display: flex;
  gap: 1.6rem 2.6rem;
  flex-wrap: wrap;
  margin-top: 2.2rem;
  padding-top: 2rem;
  border-top: 1px solid var(--line);
}
.hero-meta-item {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.hero-meta-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
}
.hero-meta-value {
  font-family: var(--serif);
  font-size: 1.45rem;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.cta-row {
  margin-top: 2.4rem;
  display: flex;
  gap: 0.9rem;
  flex-wrap: wrap;
}

/* Hero gallery (split layout) */
.hero-gallery {
  position: relative;
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  grid-template-rows: 220px 160px;
  gap: 0.75rem;
}
.hero-img {
  background: var(--bg-alt);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 18px 40px -28px rgba(0,0,0,0.18);
}
.hero-img-main { grid-row: 1 / 3; }
.hero-img svg { width: 100%; height: 100%; }
@media (min-width: 880px) {
  .hero-gallery {
    grid-template-rows: 280px 200px;
    gap: 0.9rem;
  }
}

/* Full-bleed hero variant */
.hero[data-layout="fullbleed"] .hero-grid {
  grid-template-columns: 1fr !important;
}
.hero[data-layout="fullbleed"] .hero-gallery {
  display: none;
}
.hero[data-layout="fullbleed"] .hero-content {
  max-width: 64rem;
}
.hero[data-layout="fullbleed"] .hero::after {
  display: none;
}
.hero[data-layout="fullbleed"] .hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0.95;
  display: block !important;
}
.hero[data-layout="fullbleed"] .hero-grid { position: relative; z-index: 2; }

.hero-bg { display: none; }

/* Centered hero variant */
.hero[data-layout="centered"] .hero-grid {
  grid-template-columns: 1fr !important;
  text-align: center;
  justify-items: center;
}
.hero[data-layout="centered"] .hero-content { max-width: 46rem; }
.hero[data-layout="centered"] .hero-lead { margin-left: auto; margin-right: auto; }
.hero[data-layout="centered"] .hero-meta { justify-content: center; }
.hero[data-layout="centered"] .cta-row { justify-content: center; }
.hero[data-layout="centered"] .section-label { justify-content: center; }
.hero[data-layout="centered"] .hero-tag { align-self: center; }
.hero[data-layout="centered"] .hero-gallery {
  margin-top: 3rem;
  width: 100%;
  max-width: 920px;
  grid-template-rows: 200px 140px;
}
@media (min-width: 880px) {
  .hero[data-layout="centered"] .hero-gallery { grid-template-rows: 260px 180px; }
}

/* ── About ─────────────────────────────────────────────────────────────── */

.about {
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.about-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2.5rem;
}
@media (min-width: 880px) {
  .about-grid { grid-template-columns: 0.85fr 1.15fr; gap: 5rem; }
}
.about-text p {
  color: var(--ink-soft);
  font-size: 1.02rem;
  margin-bottom: 1.1rem;
  line-height: 1.75;
  max-width: 38rem;
}
.about-text p:last-of-type { margin-bottom: 0; }

body[data-variant="editorial"] .about-text > p:first-of-type::first-letter {
  font-family: var(--serif);
  float: left;
  font-size: 3.2rem;
  line-height: 0.9;
  padding: 0.3rem 0.6rem 0 0;
  color: var(--accent);
  font-style: italic;
  font-weight: 400;
}

.feature-list {
  list-style: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.3rem 1.6rem;
  margin-top: 2.4rem;
}
@media (min-width: 720px) {
  .feature-list { grid-template-columns: repeat(3, 1fr); }
}
.feature-list li {
  padding-top: 1rem;
  border-top: 1px solid var(--line);
}
.feature-list li strong {
  display: block;
  font-family: var(--serif);
  font-size: 1.08rem;
  font-weight: 500;
  margin-bottom: 0.2rem;
  letter-spacing: -0.01em;
}
.feature-list li span {
  color: var(--ink-soft);
  font-size: 0.85rem;
}

/* ── Gallery ───────────────────────────────────────────────────────────── */

.gallery {
  background: var(--bg);
}
.gallery-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
  margin-bottom: 2.4rem;
}
.gallery-head .section-title { margin-bottom: 0; max-width: 28ch; }
.gallery-head .hint {
  font-size: 0.82rem;
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0.9rem;
  border: 1px solid var(--line);
  border-radius: 100px;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 150px;
  gap: 0.75rem;
}
.gallery-grid > .tile {
  background: var(--bg-alt);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform .35s cubic-bezier(.2,.7,.3,1);
}
.gallery-grid > .tile:hover { transform: scale(0.99); }
.gallery-grid > .tile::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(28,28,26,0.35) 100%);
  opacity: 0;
  transition: opacity .25s;
}
.gallery-grid > .tile:hover::after { opacity: 1; }
.gallery-grid > .tile .tile-label {
  position: absolute;
  bottom: 0.9rem; left: 1rem;
  font-size: 0.78rem;
  color: var(--bg);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .25s, transform .25s;
  z-index: 1;
}
.gallery-grid > .tile:hover .tile-label { opacity: 1; transform: translateY(0); }
.gallery-grid > .tile:nth-child(1) { grid-column: span 4; grid-row: span 2; }
.gallery-grid > .tile:nth-child(2) { grid-column: span 2; }
.gallery-grid > .tile:nth-child(3) { grid-column: span 2; }
.gallery-grid > .tile:nth-child(4) { grid-column: span 3; }
.gallery-grid > .tile:nth-child(5) { grid-column: span 3; }
.gallery-grid svg { width: 100%; height: 100%; }
@media (max-width: 720px) {
  .gallery-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 130px;
  }
  .gallery-grid > .tile { grid-column: span 1 !important; grid-row: auto !important; }
  .gallery-grid > .tile:nth-child(1) { grid-column: span 2 !important; grid-row: span 2 !important; }
}

/* ── Floor plan ────────────────────────────────────────────────────────── */

.floorplan {
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.fp-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 3rem;
  align-items: center;
}
@media (min-width: 880px) {
  .fp-grid { grid-template-columns: 1.2fr 0.9fr; gap: 5rem; }
}
.fp-svg {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 1.4rem;
  position: relative;
}
.fp-legend { margin-top: 2rem; }
.fp-legend dt {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 500;
  margin-top: 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.fp-legend dt::before {
  content: '';
  width: 14px; height: 14px;
  background: var(--swatch, var(--accent));
  border-radius: 2px;
}
.fp-legend dd {
  color: var(--ink-soft);
  font-size: 0.9rem;
  padding-left: 1.4rem;
  margin-top: 0.2rem;
}

/* ── Host card ─────────────────────────────────────────────────────────── */

.host {
  background: var(--bg);
  border-top: 1px solid var(--line);
}
.host-card {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 2.4rem;
  align-items: center;
}
@media (min-width: 720px) {
  .host-card { grid-template-columns: auto 1fr auto; gap: 3rem; padding: 2.8rem 3rem; }
}
.host-avatar {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--bg-alt);
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.host-avatar svg { width: 100%; height: 100%; }
.host-meta .host-name {
  font-family: var(--serif);
  font-size: 1.5rem;
  letter-spacing: -0.01em;
  margin-bottom: 0.2rem;
}
.host-meta .host-bio {
  color: var(--ink-soft);
  font-size: 0.95rem;
  line-height: 1.65;
  max-width: 40rem;
}
.host-stats {
  display: flex;
  gap: 1.6rem;
  margin-top: 1.2rem;
  flex-wrap: wrap;
}
.host-stat {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
}
.host-stat-num {
  font-family: var(--serif);
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 500;
}
.host-stat-label {
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
}
.host-actions {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.host-actions a {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.7rem 1.1rem;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 0.85rem;
  background: var(--bg);
  transition: background .2s, border-color .2s;
}
.host-actions a:hover { background: var(--bg-alt); border-color: var(--line-strong); }

/* ── Neighborhood ──────────────────────────────────────────────────────── */

.neigh {
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.neigh-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 3rem;
}
@media (min-width: 880px) {
  .neigh-grid { grid-template-columns: 0.9fr 1.1fr; gap: 4rem; }
}
.neigh-map {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  aspect-ratio: 4 / 3;
  position: relative;
  overflow: hidden;
}
.neigh-map svg { width: 100%; height: 100%; }
.neigh-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.neigh-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1.1rem;
  padding: 1.1rem 0;
  border-top: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
  transition: padding .2s;
}
.neigh-item:last-child { border-bottom: 1px solid var(--line); }
.neigh-item:hover { padding-left: 0.5rem; }
.neigh-item:hover .neigh-name { color: var(--accent); }
.neigh-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-alt);
  display: grid;
  place-items: center;
  color: var(--ink);
  font-size: 0.92rem;
}
.neigh-name {
  font-family: var(--serif);
  font-size: 1.1rem;
  transition: color .2s;
}
.neigh-sub {
  color: var(--ink-soft);
  font-size: 0.82rem;
  margin-top: 0.1rem;
}
.neigh-dist {
  font-family: var(--serif);
  font-size: 0.95rem;
  color: var(--ink-soft);
  white-space: nowrap;
}

/* ── Booking ───────────────────────────────────────────────────────────── */

.booking {
  background: var(--ink);
  color: var(--bg);
}
.booking .section-label { color: var(--accent-soft); }
.booking .section-label::before { background: var(--accent-soft); }
.booking .section-title { color: var(--bg); }
.booking .section-title em { color: var(--accent-soft); }
.booking-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 3rem;
}
@media (min-width: 980px) {
  .booking-grid { grid-template-columns: 0.9fr 1.1fr; gap: 4rem; }
}

.booking-info p {
  color: rgba(244, 240, 232, 0.7);
  margin-bottom: 1rem;
  line-height: 1.7;
  max-width: 32rem;
}

.price-card {
  background: rgba(244, 240, 232, 0.04);
  border: 1px solid rgba(244, 240, 232, 0.12);
  padding: 2rem;
  border-radius: var(--radius-lg);
  margin-top: 2.4rem;
}
.price-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid rgba(244, 240, 232, 0.12);
  margin-bottom: 1rem;
}
.price-amount {
  font-family: var(--serif);
  font-size: 2.6rem;
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1;
}
.price-amount sub { font-size: 1.1rem; font-weight: 400; vertical-align: baseline; }
.price-period {
  font-size: 0.78rem;
  color: rgba(244, 240, 232, 0.55);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}
.price-detail {
  display: flex;
  justify-content: space-between;
  font-size: 0.88rem;
  padding: 0.4rem 0;
  color: rgba(244, 240, 232, 0.75);
}
.price-detail strong { color: var(--bg); font-weight: 500; }

/* Booking form card */
.booking-form {
  background: var(--bg);
  color: var(--ink);
  padding: 2.2rem;
  border-radius: var(--radius-lg);
  box-shadow: 0 30px 60px -30px rgba(0,0,0,0.4);
}
@media (min-width: 720px) {
  .booking-form { padding: 2.6rem; }
}
.form-title {
  font-family: var(--serif);
  font-size: 1.6rem;
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}
.form-sub {
  color: var(--ink-soft);
  font-size: 0.88rem;
  margin-bottom: 1.6rem;
}

/* Date picker block */
.date-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 0.8rem;
  background: var(--paper);
}
.date-cell {
  padding: 0.95rem 1.1rem;
  cursor: pointer;
  position: relative;
  transition: background .2s;
}
.date-cell + .date-cell { border-left: 1px solid var(--line); }
.date-cell:hover { background: var(--bg); }
.date-cell.active { background: var(--bg); }
.date-cell.active::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid var(--ink);
  border-radius: var(--radius);
  pointer-events: none;
}
.date-cell label {
  display: block;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  margin-bottom: 0.25rem;
}
.date-cell .date-val {
  font-family: var(--serif);
  font-size: 1.15rem;
  letter-spacing: -0.01em;
}
.date-cell .date-sub {
  font-size: 0.75rem;
  color: var(--ink-soft);
  margin-top: 0.1rem;
}

/* Inline calendar */
.cal {
  margin: 0.6rem 0 1rem;
  padding: 1rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.cal-month {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 500;
}
.cal-nav {
  display: flex;
  gap: 0.3rem;
}
.cal-nav button {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--bg);
  display: grid;
  place-items: center;
  transition: background .15s, border-color .15s;
}
.cal-nav button:hover { background: var(--bg-alt); }
.cal-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  text-align: center;
  margin-bottom: 0.4rem;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-day {
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  font-size: 0.85rem;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  color: var(--ink);
  transition: background .15s, color .15s;
  font-variant-numeric: tabular-nums;
}
.cal-day:hover:not(.disabled):not(.empty) { background: var(--bg-alt); }
.cal-day.disabled, .cal-day.empty {
  color: var(--ink-mute);
  cursor: not-allowed;
}
.cal-day.empty { visibility: hidden; }
.cal-day.booked {
  text-decoration: line-through;
  color: var(--ink-mute);
  cursor: not-allowed;
}
.cal-day.in-range { background: rgba(139,58,29,0.10); border-radius: 0; }
.cal-day.range-start { background: var(--ink); color: var(--bg); border-radius: 50% 0 0 50%; }
.cal-day.range-end { background: var(--ink); color: var(--bg); border-radius: 0 50% 50% 0; }
.cal-day.range-single { background: var(--ink); color: var(--bg); border-radius: 50%; }

/* Form fields */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  margin-bottom: 0.7rem;
}
.form-field { display: flex; flex-direction: column; }
.form-field-full { grid-column: 1 / -1; }
.form-field label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  margin-bottom: 0.35rem;
}
.form-field input,
.form-field select {
  padding: 0.85rem 1rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 0.95rem;
  color: var(--ink);
  transition: border-color .2s, background .2s;
}
.form-field input:focus,
.form-field select:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
}

.summary-box {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin: 1.2rem 0;
}
.summary-line {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  padding: 0.3rem 0;
  color: var(--ink-soft);
}
.summary-total {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--serif);
  font-size: 1.5rem;
  padding-top: 0.8rem;
  margin-top: 0.4rem;
  border-top: 1px solid var(--line);
  color: var(--ink);
}
.summary-total .num { color: var(--accent); font-weight: 500; }

.book-btn {
  width: 100%;
  padding: 1.1rem;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 100px;
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: background .25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.book-btn:hover { background: var(--accent); }
.book-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.payment-note {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1rem;
  font-size: 0.78rem;
  color: var(--ink-soft);
}
.payment-methods {
  display: flex;
  gap: 0.4rem;
  align-items: center;
}
.pm-pill {
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.45rem;
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--ink-soft);
  text-transform: uppercase;
}

/* ── Testimonials ──────────────────────────────────────────────────────── */

.testi {
  background: var(--bg);
  border-top: 1px solid var(--line);
}
.testi-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 2rem;
  margin-bottom: 2.4rem;
}
.testi-track-wrap { overflow: hidden; position: relative; }
.testi-track {
  display: flex;
  gap: 1.4rem;
  transition: transform .5s cubic-bezier(.2,.7,.3,1);
  padding-bottom: 0.5rem;
}
.testi-card {
  flex: 0 0 calc(100% - 0.5rem);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 2.2rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
@media (min-width: 720px) {
  .testi-card { flex: 0 0 calc(50% - 0.7rem); }
}
@media (min-width: 1080px) {
  .testi-card { flex: 0 0 calc(33.333% - 1rem); }
}
.testi-stars { color: var(--accent); letter-spacing: 0.1em; font-size: 0.92rem; }
.testi-quote {
  font-family: var(--serif);
  font-size: 1.15rem;
  line-height: 1.4;
  color: var(--ink);
  text-wrap: pretty;
  letter-spacing: -0.01em;
  flex-grow: 1;
}
.testi-meta {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--line);
}
.testi-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-alt);
  display: grid;
  place-items: center;
  font-family: var(--serif);
  color: var(--accent);
  font-weight: 500;
  flex-shrink: 0;
}
.testi-name {
  font-size: 0.94rem;
  font-weight: 500;
  line-height: 1.2;
}
.testi-sub {
  font-size: 0.78rem;
  color: var(--ink-soft);
  margin-top: 0.1rem;
}
.testi-controls {
  display: flex;
  gap: 0.4rem;
  margin-top: 1.8rem;
}
.testi-controls button {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--paper);
  display: grid;
  place-items: center;
  transition: background .15s, transform .15s;
}
.testi-controls button:hover { background: var(--bg-alt); }
.testi-controls button:active { transform: scale(0.96); }
.testi-controls button:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Rules ─────────────────────────────────────────────────────────────── */

.rules {
  background: var(--paper);
  border-top: 1px solid var(--line);
}
.rules-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2.5rem;
}
@media (min-width: 880px) {
  .rules-grid { grid-template-columns: 0.85fr 1.15fr; gap: 5rem; }
}
.rule-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.4rem;
}
.rule-card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 1.3rem;
}
.rule-card .rc-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  margin-bottom: 0.4rem;
}
.rule-card .rc-val {
  font-family: var(--serif);
  font-size: 1.35rem;
  letter-spacing: -0.01em;
}
.rule-card .rc-sub {
  font-size: 0.84rem;
  color: var(--ink-soft);
  margin-top: 0.3rem;
}
.rule-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin-top: 1.4rem;
}
.rule-list li {
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: 0.7rem;
  font-size: 0.92rem;
  color: var(--ink);
  align-items: baseline;
}
.rule-list li::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  margin-top: 0.55rem;
}

/* ── FAQ ───────────────────────────────────────────────────────────────── */

.faq {
  background: var(--bg);
  border-top: 1px solid var(--line);
}
.faq-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2.5rem;
}
@media (min-width: 880px) {
  .faq-grid { grid-template-columns: 0.6fr 1fr; gap: 5rem; }
}
.faq-list {
  display: flex;
  flex-direction: column;
}
.faq-item {
  border-top: 1px solid var(--line);
  padding: 1.4rem 0;
  cursor: pointer;
}
.faq-item:last-child { border-bottom: 1px solid var(--line); }
.faq-q {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
  font-family: var(--serif);
  font-size: 1.15rem;
  letter-spacing: -0.01em;
  transition: color .2s;
}
.faq-item:hover .faq-q { color: var(--accent); }
.faq-toggle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: transform .3s ease, background .2s, border-color .2s;
  font-size: 0.85rem;
  line-height: 1;
}
.faq-item.open .faq-toggle {
  transform: rotate(45deg);
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease, padding .25s;
  color: var(--ink-soft);
  font-size: 0.96rem;
  line-height: 1.7;
  max-width: 56ch;
}
.faq-item.open .faq-a {
  max-height: 220px;
  padding-top: 0.9rem;
}

/* ── Trust ─────────────────────────────────────────────────────────────── */

.trust {
  background: var(--paper);
  border-top: 1px solid var(--line);
  text-align: center;
  padding: 5rem 0;
}
.trust-title {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 3vw, 2rem);
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.trust-sub {
  color: var(--ink-soft);
  font-size: 0.92rem;
  margin-bottom: 3rem;
}
.trust-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 2rem;
  max-width: 920px;
  margin: 0 auto;
}
.trust-item { text-align: left; padding-top: 1.4rem; border-top: 1px solid var(--line); }
.trust-num {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.02em;
}
.trust-label {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-top: 0.4rem;
  text-wrap: balance;
}

/* ── Footer ────────────────────────────────────────────────────────────── */

footer {
  background: var(--ink);
  color: rgba(244, 240, 232, 0.6);
  padding: 4rem 0 2rem;
}
.foot-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2.5rem;
  padding-bottom: 2.5rem;
  border-bottom: 1px solid rgba(244, 240, 232, 0.1);
}
@media (min-width: 720px) {
  .foot-grid { grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 3rem; }
}
.foot-brand {
  font-family: var(--serif);
  font-size: 1.6rem;
  color: var(--bg);
  margin-bottom: 0.7rem;
  letter-spacing: -0.01em;
}
.foot-brand em { color: var(--accent-soft); font-style: italic; }
.foot-tag { font-size: 0.92rem; line-height: 1.6; max-width: 28rem; }
.foot-h {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(244, 240, 232, 0.4);
  margin-bottom: 1rem;
}
.foot-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  font-size: 0.92rem;
}
.foot-list a:hover { color: var(--bg); }
.foot-bottom {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(244, 240, 232, 0.35);
  padding-top: 2rem;
}

/* ── Sticky mobile booking widget ──────────────────────────────────────── */

.sticky-book {
  position: fixed;
  bottom: 16px;
  left: 16px; right: 16px;
  z-index: 60;
  background: var(--ink);
  color: var(--bg);
  border-radius: 100px;
  padding: 0.7rem 0.85rem 0.7rem 1.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
  transition: opacity .35s ease, transform .35s ease;
}
.sticky-book.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
.sticky-book .sb-price {
  font-family: var(--serif);
  font-size: 1.05rem;
  letter-spacing: -0.01em;
}
.sticky-book .sb-sub {
  font-size: 0.7rem;
  color: rgba(244,240,232,0.55);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.sticky-book button {
  padding: 0.7rem 1.3rem;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 100px;
  font-weight: 500;
  font-size: 0.88rem;
  transition: background .2s;
}
.sticky-book button:hover { background: var(--accent-soft); }
@media (min-width: 880px) {
  .sticky-book { display: none; }
}

/* ── WhatsApp floating CTA ─────────────────────────────────────────────── */

.wa-fab {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 55;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #1f8a5b;
  display: grid;
  place-items: center;
  color: #fff;
  box-shadow: 0 10px 28px -8px rgba(0,0,0,0.4), 0 0 0 0 rgba(31,138,91,0.5);
  animation: wa-pulse 2.6s infinite;
  transition: transform .2s;
}
.wa-fab:hover { transform: scale(1.06); }
@keyframes wa-pulse {
  0% { box-shadow: 0 10px 28px -8px rgba(0,0,0,0.4), 0 0 0 0 rgba(31,138,91,0.45); }
  70% { box-shadow: 0 10px 28px -8px rgba(0,0,0,0.4), 0 0 0 14px rgba(31,138,91,0); }
  100% { box-shadow: 0 10px 28px -8px rgba(0,0,0,0.4), 0 0 0 0 rgba(31,138,91,0); }
}
@media (max-width: 879px) {
  .wa-fab { bottom: 80px; }   /* sit above sticky book */
}

/* ── Lightbox ──────────────────────────────────────────────────────────── */

.lb-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 18, 14, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: grid;
  place-items: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.lb-backdrop.open { opacity: 1; pointer-events: auto; }
.lb-frame {
  width: 100%;
  max-width: 1100px;
  background: var(--paper);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  aspect-ratio: 16 / 10;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  transform: scale(0.96);
  transition: transform .3s ease;
}
.lb-backdrop.open .lb-frame { transform: scale(1); }
.lb-frame svg { width: 100%; height: 100%; display: block; }
.lb-cap {
  position: absolute;
  left: 1.6rem;
  bottom: 1.4rem;
  color: var(--bg);
  font-family: var(--serif);
  font-size: 1.4rem;
  letter-spacing: -0.01em;
  text-shadow: 0 1px 14px rgba(0,0,0,0.5);
}
.lb-close, .lb-nav {
  position: absolute;
  background: rgba(255,255,255,0.92);
  border: none;
  border-radius: 50%;
  width: 44px; height: 44px;
  display: grid;
  place-items: center;
  transition: background .2s;
  z-index: 5;
}
.lb-close:hover, .lb-nav:hover { background: #fff; }
.lb-close { top: -56px; right: 0; }
.lb-prev { top: 50%; left: -64px; transform: translateY(-50%); }
.lb-next { top: 50%; right: -64px; transform: translateY(-50%); }

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

              role="switch" aria-checked={!!value}

    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

// ── QR code (fake but plausible) ─────────────────────────────────────────
function FakeQR() {
  // Deterministic pseudo-random 25×25 grid with corner finders.
  const N = 25;
  const cells = useMemo(() => {
    const out = [];
    let seed = 7919;
    const rng = () => {
      seed = (seed * 9301 + 49297) % 233280;
      return seed / 233280;
    };
    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        const isFinder = (
          (x < 7 && y < 7) ||
          (x > N - 8 && y < 7) ||
          (x < 7 && y > N - 8)
        );
        if (!isFinder && rng() > 0.55) out.push([x, y]);
      }
    }
    return out;
  }, []);
  const finder = (x, y) => (
    <g key={`f-${x}-${y}`}>
      <rect x={x} y={y} width="7" height="7" fill="#1c1c1a" />
      <rect x={x + 1} y={y + 1} width="5" height="5" fill="#fff" />
      <rect x={x + 2} y={y + 2} width="3" height="3" fill="#1c1c1a" />
    </g>
  );
  return (
    <svg viewBox={`0 0 ${N} ${N}`} shapeRendering="crispEdges">
      <rect width={N} height={N} fill="#fff" />
      {cells.map(([x, y]) => (
        <rect key={`c-${x}-${y}`} x={x} y={y} width="1" height="1" fill="#1c1c1a" />
      ))}
      {finder(0, 0)}
      {finder(N - 7, 0)}
      {finder(0, N - 7)}
      {/* center logo cutout */}
      <rect x={(N / 2) - 3} y={(N / 2) - 3} width="6" height="6" fill="#fff" />
      <circle cx={N / 2} cy={N / 2} r="2.2" fill="#8b3a1d" />
    </svg>
  );
}

// (removed duplicate React destructure)
// Date helpers (no library — keep it tight)
const DAYS_ID = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

function daysInMonth(year, monthIdx) {
  return new Date(year, monthIdx + 1, 0).getDate();
}
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function diffDays(a, b) { return Math.round((startOfDay(b) - startOfDay(a)) / 86400000); }
function fmtISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function fmtNice(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}
function fmtWeekday(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
function fmtIDR(n) {
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

// Pre-booked dates (demo) — relative to today
function generateBookedRanges() {
  const today = startOfDay(new Date());
  const ranges = [
    [addDays(today, 6), addDays(today, 9)],
    [addDays(today, 18), addDays(today, 21)],
    [addDays(today, 32), addDays(today, 34)],
    [addDays(today, 48), addDays(today, 52)],
  ];
  const set = new Set();
  ranges.forEach(([a, b]) => {
    for (let d = new Date(a); d <= b; d = addDays(d, 1)) {
      set.add(fmtISO(d));
    }
  });
  return set;
}

// ── Inline calendar with range selection ──────────────────────────────────
function Calendar({ checkIn, checkOut, onPickIn, onPickOut, bookedDates }) {
  const today = startOfDay(new Date());
  const [viewMonth, setViewMonth] = useState(() => {
    const d = checkIn ? new Date(checkIn) : today;
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const [hoverDate, setHoverDate] = useState(null);
  // selection mode: 0 = pick check-in, 1 = pick check-out
  const [mode, setMode] = useState(checkIn && !checkOut ? 1 : 0);

  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const firstWeekday = new Date(year, month, 1).getDay();
  const total = daysInMonth(year, month);

  const canPrev = (viewMonth.getFullYear() > today.getFullYear()) ||
    (viewMonth.getFullYear() === today.getFullYear() && viewMonth.getMonth() > today.getMonth());

  const goPrev = () => {
    if (!canPrev) return;
    setViewMonth(new Date(year, month - 1, 1));
  };
  const goNext = () => setViewMonth(new Date(year, month + 1, 1));

  const handleClick = (d) => {
    const iso = fmtISO(d);
    if (bookedDates.has(iso)) return;
    if (d < today) return;
    if (mode === 0 || !checkIn) {
      onPickIn(d);
      onPickOut(null);
      setMode(1);
    } else {
      // ensure ≥ check-in + min stay; if not, restart
      if (d <= checkIn) {
        onPickIn(d);
        onPickOut(null);
        setMode(1);
        return;
      }
      // ensure no booked date in between
      let blocked = false;
      for (let cur = addDays(checkIn, 1); cur <= d; cur = addDays(cur, 1)) {
        if (bookedDates.has(fmtISO(cur))) { blocked = true; break; }
      }
      if (blocked) {
        onPickIn(d);
        onPickOut(null);
        setMode(1);
        return;
      }
      onPickOut(d);
      setMode(0);
    }
  };

  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push({ empty: true, key: `e-${i}` });
  for (let day = 1; day <= total; day++) {
    const d = new Date(year, month, day);
    const iso = fmtISO(d);
    const past = d < today;
    const booked = bookedDates.has(iso);
    const isIn = checkIn && fmtISO(checkIn) === iso;
    const isOut = checkOut && fmtISO(checkOut) === iso;
    let inRange = false;
    if (checkIn && checkOut) {
      inRange = d > checkIn && d < checkOut;
    } else if (checkIn && hoverDate && mode === 1 && hoverDate > checkIn) {
      inRange = d > checkIn && d < hoverDate;
    }
    cells.push({
      key: iso,
      day, d, iso,
      disabled: past || booked,
      booked,
      isIn, isOut,
      inRange,
      hoverEnd: checkIn && !checkOut && mode === 1 && hoverDate && fmtISO(hoverDate) === iso && d > checkIn,
    });
  }

  return (
    <div className="cal" data-noncommentable="">
      <div className="cal-head">
        <div className="cal-month serif">{MONTH_NAMES[month]} {year}</div>
        <div className="cal-nav">
          <button onClick={goPrev} disabled={!canPrev} aria-label="Previous month">‹</button>
          <button onClick={goNext} aria-label="Next month">›</button>
        </div>
      </div>
      <div className="cal-weekdays">
        {DAYS_ID.map((d) => <div key={d}>{d}</div>)}
      </div>
      <div className="cal-grid">
        {cells.map((c) => {
          if (c.empty) return <div key={c.key} className="cal-day empty" />;
          const classes = ['cal-day'];
          if (c.disabled) classes.push('disabled');
          if (c.booked) classes.push('booked');
          if (c.isIn && c.isOut) classes.push('range-single');
          else if (c.isIn) classes.push('range-start');
          else if (c.isOut || c.hoverEnd) classes.push('range-end');
          if (c.inRange) classes.push('in-range');
          return (
            <div key={c.key}
                 className={classes.join(' ')}
                 onMouseEnter={() => setHoverDate(c.d)}
                 onMouseLeave={() => setHoverDate(null)}
                 onClick={() => handleClick(c.d)}>
              {c.day}
            </div>
          );
        })}
      </div>
      <div style={{marginTop: '0.9rem', display: 'flex', gap: '1rem', flexWrap: 'wrap',
                   fontSize: '0.72rem', color: 'var(--ink-soft)', alignItems: 'center'}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:'0.4rem'}}>
          <span style={{width:'10px',height:'10px',background:'var(--ink)',borderRadius:'50%'}} /> Selected
        </span>
        <span style={{display:'inline-flex',alignItems:'center',gap:'0.4rem'}}>
          <span style={{width:'10px',height:'10px',background:'rgba(139,58,29,0.20)',borderRadius:'2px'}} /> Within stay
        </span>
        <span style={{display:'inline-flex',alignItems:'center',gap:'0.4rem',textDecoration:'line-through'}}>
          Booked
        </span>
      </div>
    </div>
  );
}

// ── Midtrans modal — multi-step ───────────────────────────────────────────
function MidtransModal({ open, onClose, booking }) {
  const [step, setStep] = useState(0);          // 0 = choose method, 1 = QR / detail, 2 = success
  const [method, setMethod] = useState('qris');
  const [timeLeft, setTimeLeft] = useState(890); // ~15min countdown

  useEffect(() => {
    if (!open) { setStep(0); setTimeLeft(890); return; }
    const onEsc = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onEsc);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onEsc);
      document.body.style.overflow = '';
    };
  }, [open, onClose]);

  useEffect(() => {
    if (!open || step !== 1) return;
    const t = setInterval(() => setTimeLeft((s) => Math.max(0, s - 1)), 1000);
    return () => clearInterval(t);
  }, [open, step]);

  // Auto-progress to success after 4s on the QR screen for demo flavour
  useEffect(() => {
    if (step !== 1 || !open) return;
    const t = setTimeout(() => setStep(2), 5400);
    return () => clearTimeout(t);
  }, [step, open]);

  if (!booking) return null;

  const minutes = Math.floor(timeLeft / 60);
  const seconds = String(timeLeft % 60).padStart(2,'0');

  const methods = [
    { id: 'qris', name: 'QRIS', sub: 'GoPay · OVO · Dana · ShopeePay · all banks', tag: 'QR' },
    { id: 'va', name: 'Bank transfer (VA)', sub: 'BCA · Mandiri · BNI · BRI', tag: 'VA' },
    { id: 'ewallet', name: 'E-Wallet', sub: 'GoPay, OVO, Dana, ShopeePay', tag: 'EW' },
    { id: 'cc', name: 'Credit / Debit card', sub: 'Visa, Mastercard, JCB', tag: 'CC' },
  ];

  return (
    <div className={`mt-backdrop ${open ? 'open' : ''}`} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="mt-modal" data-noncommentable="" role="dialog" aria-modal="true">
        <div className="mt-head">
          <div className="mt-brand">
            <div className="mt-logo">M</div>
            <span>Midtrans Secure Checkout</span>
          </div>
          <button className="mt-close" onClick={onClose} aria-label="Close">✕</button>
        </div>

        <div className="mt-body">
          {step === 0 && (
            <>
              <div className="mt-amount">
                <div>
                  <div className="mt-label">Casa Riviera · {booking.nights} {booking.nights === 1 ? 'night' : 'nights'}</div>
                  <div className="mt-val serif">{fmtIDR(booking.total)}</div>
                </div>
                <div style={{textAlign:'right', fontSize: '0.78rem', color: 'var(--ink-soft)'}}>
                  <div>{fmtNice(booking.checkIn)}</div>
                  <div>→ {fmtNice(booking.checkOut)}</div>
                </div>
              </div>

              <div style={{fontSize:'0.78rem', color:'var(--ink-soft)', letterSpacing:'0.06em',
                           textTransform:'uppercase', marginTop:'0.5rem'}}>Choose payment method</div>

              <div className="mt-methods">
                {methods.map((m) => (
                  <div key={m.id}
                       className={`mt-method ${method === m.id ? 'selected' : ''}`}
                       onClick={() => setMethod(m.id)}>
                    <div className="mt-method-left">
                      <div className="mt-method-icon">{m.tag}</div>
                      <div>
                        <div className="mt-method-name">{m.name}</div>
                        <div className="mt-method-sub">{m.sub}</div>
                      </div>
                    </div>
                    <div className="mt-check">{method === m.id ? '✓' : ''}</div>
                  </div>
                ))}
              </div>

              <button className="mt-pay-btn" onClick={() => setStep(1)}>
                Continue with {methods.find((x) => x.id === method).name}
              </button>
            </>
          )}

          {step === 1 && (
            <>
              <div className="mt-amount">
                <div>
                  <div className="mt-label">Amount due</div>
                  <div className="mt-val serif">{fmtIDR(booking.total)}</div>

                  <div className="mt-timer serif">{minutes}:{seconds}</div>
                </div>
              </div>

              {method === 'qris' && (
                <div className="mt-qr-wrap">
                  <div style={{fontSize:'0.84rem', color:'var(--ink-soft)', textAlign:'center'}}>
                    Scan with any QRIS-enabled app

                  <div style={{display:'flex', gap:'0.4rem', flexWrap:'wrap', justifyContent:'center'}}>
                    <span className="pm-pill" style={{borderColor:'var(--line-strong)'}}>GoPay</span>
                    <span className="pm-pill" style={{borderColor:'var(--line-strong)'}}>OVO</span>
                    <span className="pm-pill" style={{borderColor:'var(--line-strong)'}}>Dana</span>

                    Waiting for payment confirmation… (demo will auto-confirm)

              {method === 'va' && (

function Lightbox({ open, index, onClose, onNav }) {
  // (use outer Art)

    { label: 'Living & dining', art: <Art.LivingRoom /> },
    { label: 'Bedroom', art: <Art.Bedroom /> },
    { label: 'Kitchen', art: <Art.Kitchen /> },
    { label: 'Dining nook', art: <Art.Dining /> },
    { label: 'Tower pool', art: <Art.Pool /> },
  ];
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowRight') onNav(1);
      else if (e.key === 'ArrowLeft') onNav(-1);
    };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [open, onClose, onNav]);
  if (!open) return null;
  const s = slides[index];
  return (
    <div className={`lb-backdrop ${open ? 'open' : ''}`} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="lb-frame" data-noncommentable="">
        <div className="lb-counter">{String(index + 1).padStart(2,'0')} / {String(slides.length).padStart(2,'0')}</div>

        <button className="lb-nav lb-prev" onClick={() => onNav(-1)} aria-label="Previous">‹</button>

        {s.art}
        <div className="lb-cap serif">{s.label}</div>
      </div>
    </div>
  );
}

    { name: 'Bayu R.', sub: 'Surabaya · Business trip · 3 nights',
      quote: 'Quiet floor, fast WiFi, good desk by the window. I worked four full days here and forgot it wasn\'t my apartment.',
      initial: 'B' },
    { name: 'Lina & Hadi', sub: 'Bandung · Anniversary · 2 nights',
      quote: 'The view at sunset is genuinely lovely. Touchless check-in worked, every small thing you\'d want was already there.',
      initial: 'L' },
    { name: 'Kenji T.', sub: 'Tokyo · Visiting partner · 5 nights',
      quote: 'My Japanese standards for cleanliness are uncompromising. This unit met them. Recommended.',
      initial: 'K' },
    { name: 'Sari D.', sub: 'Jakarta · Weekend · 2 nights',
      quote: 'The mall is genuinely two minutes on foot. We ate well, slept well, did nothing. Will book again.',
      initial: 'S' },
  ];
  const [index, setIndex] = useState(0);
  const trackRef = useRef(null);
  const [perView, setPerView] = useState(1);

  useEffect(() => {
    const calc = () => {
      const w = window.innerWidth;
      setPerView(w >= 1080 ? 3 : w >= 720 ? 2 : 1);
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  const max = Math.max(0, reviews.length - perView);
  const safeIdx = Math.min(index, max);
  const translate = -(safeIdx * (100 / perView));

  return (
    <section className="testi section-pad" id="reviews" data-screen-label="07 Reviews">
      <div className="container">
        <div className="testi-head reveal">
          <div>
            <div className="section-label">Guest reviews</div>

          </div>
          <div style={{textAlign: 'right'}}>
            <div className="serif" style={{fontSize:'2.8rem', lineHeight: '1', letterSpacing: '-0.03em'}}>4.9</div>
            <div className="testi-stars" style={{margin: '0.3rem 0'}}>★★★★★</div>
            <div style={{fontSize:'0.82rem', color:'var(--ink-soft)'}}>From 47 verified stays</div>
          </div>
        </div>

        <div className="testi-track-wrap reveal reveal-delay-1">
          <div className="testi-track" ref={trackRef}
               style={{transform: `translateX(calc(${translate}% - ${safeIdx > 0 ? '0.7rem' : '0'}))`}}>
            {reviews.map((r) => (
              <div className="testi-card" key={r.name}>
                <div className="testi-stars">★★★★★</div>
                <div className="testi-quote">"{r.quote}"</div>
                <div className="testi-meta">
                  <div className="testi-avatar">{r.initial}</div>
                  <div>
                    <div className="testi-name">{r.name}</div>
                    <div className="testi-sub">{r.sub}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="testi-controls">
          <button onClick={() => setIndex(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0} aria-label="Previous">‹</button>
          <button onClick={() => setIndex(Math.min(max, safeIdx + 1))} disabled={safeIdx === max} aria-label="Next">›</button>
        </div>
      </div>
    </section>
  );
}

// ── Sticky mobile booking bar ────────────────────────────────────────────
function StickyBook({ total, nights, onClick }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY;
      const isMobile = window.innerWidth < 880;
      const booking = document.getElementById('booking');
      const footer = document.querySelector('footer');
      let beforeBooking = true;
      let pastFooter = false;
      if (booking) {
        const rect = booking.getBoundingClientRect();
        beforeBooking = rect.top > window.innerHeight * 0.4;
      }
      if (footer) {
        const r = footer.getBoundingClientRect();
        pastFooter = r.top < window.innerHeight * 0.7;
      }
      setVisible(isMobile && y > window.innerHeight * 0.6 && beforeBooking && !pastFooter);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    onScroll();
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
    };
  }, []);
  const { fmtIDR } = bookingHelpers;
  return (
    <div className={`sticky-book ${visible ? 'visible' : ''}`}>
      <div>
        <div className="sb-price serif">
          {nights > 0 ? fmtIDR(total) : 'Rp 750.000'}
        </div>
        <div className="sb-sub">{nights > 0 ? `${nights} ${nights === 1 ? 'night' : 'nights'} total` : 'per night'}</div>
      </div>
      <button onClick={onClick}>Reserve</button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// App — root composition, variant switching, modal state
// ─────────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "minimal",
  "heroLayout": "split",
  "palette": ["#8b3a1d", "#c08c4c", "#f4f0e8"]
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [bookingTotals, setBookingTotals] = useState({ total: 0, nights: 0 });
  const [lbOpen, setLbOpen] = useState(false);
  const [lbIndex, setLbIndex] = useState(0);
  const [mtOpen, setMtOpen] = useState(false);
  const [mtBooking, setMtBooking] = useState(null);

  // Apply variant to <body> so CSS variants attach via attribute selectors
  useEffect(() => {
    document.body.dataset.variant = t.variant;
  }, [t.variant]);

  // Reveal-on-scroll using IntersectionObserver
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [t.heroLayout, t.variant]);

  const openLightbox = (i) => { setLbIndex(i); setLbOpen(true); };
  const navLb = (delta) => setLbIndex((i) => {
    const n = 5;          // # of gallery tiles
    return ((i + delta) % n + n) % n;
  });

  const openModalFromForm = (b) => { setMtBooking(b); setMtOpen(true); };
  const openModalFromSticky = () => {
    const el = document.getElementById('booking');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const openWhatsApp = () => {
    window.open('https://wa.me/6281234567890?text=' + encodeURIComponent('Hi, I\'d like to ask about Casa Riviera at Meikarta D2.'), '_blank');
  };

  return (
    <>
      <Nav onBook={openModalFromSticky} />
      <Hero layout={t.heroLayout} onCheck={() => {}} />
      <About />
      <Gallery onOpenLightbox={openLightbox} />
      <FloorPlanSection />
      <Host onWhatsApp={openWhatsApp} />
      <Neighborhood />
      <BookingSection onTotalChange={setBookingTotals} openModal={openModalFromForm} />
      <Testimonials />
      <HouseRules />
      <FAQ />
      <Trust />
      <Footer />

      <Lightbox open={lbOpen} index={lbIndex} onClose={() => setLbOpen(false)} onNav={navLb} />
      <MidtransModal open={mtOpen} onClose={() => setMtOpen(false)} booking={mtBooking} />
      <StickyBook total={bookingTotals.total} nights={bookingTotals.nights} onClick={openModalFromSticky} />
      <WhatsAppFab onClick={openWhatsApp} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Style">
          <TweakRadio label="Variant" value={t.variant}
                      options={['minimal','editorial','playful']}
                      onChange={(v) => setTweak('variant', v)} />
        </TweakSection>
        <TweakSection label="Hero">
          <TweakRadio label="Layout" value={t.heroLayout}
                      options={['split','centered','fullbleed']}
                      onChange={(v) => setTweak('heroLayout', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
